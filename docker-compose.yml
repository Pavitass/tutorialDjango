services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tienda}
      POSTGRES_USER: ${POSTGRES_USER:-tienda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tienda}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:

